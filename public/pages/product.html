<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — Sick Fits</title>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    .single-product {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 600px;
      gap: 2rem;
      align-items: start;
    }
    .single-product img {
      width: 100%;
      height: 500px;
      object-fit: cover;
    }
    .product-details { padding: 2rem; }
    .product-details h2 { font-size: 3rem; margin-top: 0; }
    .product-details p { font-size: 1.5rem; line-height: 1.8; }
    @media (max-width: 700px) {
      .single-product { grid-template-columns: 1fr; }
      .single-product img { height: 300px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="inner-header">
      <div class="logo"><a href="/">Sick Fits</a></div>
      <nav class="nav-links" id="main-nav"></nav>
    </div>
  </header>
  <div class="page" id="product-container">
    <p class="loading-text">Loading...</p>
  </div>
  <script type="module">
    import { api, getUser, isLoggedIn, toast, formatPrice, renderNav, updateCartBadge } from '/js/utils.js'
    renderNav('main-nav')
    updateCartBadge()

    const id = new URLSearchParams(location.search).get('id')
    if (!id) {
      document.getElementById('product-container').innerHTML =
        '<div class="error-message"><p><strong>Error:</strong> No product ID provided.</p></div>'
    } else {
      api(`/products/${id}`).then(p => {
        document.title = `${p.name} — Sick Fits`
        document.getElementById('product-container').innerHTML = `
          <div class="single-product">
            <div>
              ${p.imageUrl
                ? `<img src="${p.imageUrl}" alt="${p.name}"/>`
                : `<div style="width:100%;height:500px;background:var(--offWhite);display:flex;align-items:center;justify-content:center;color:var(--lightGray);font-size:1.5rem">No Image Available</div>`
              }
            </div>
            <div class="product-details">
              <h2>${p.name}</h2>
              <span class="price-tag" style="position:relative;top:auto;right:auto;display:inline-block;margin-bottom:2rem">
                ${formatPrice(p.price)}
              </span>
              <p>${p.description}</p>
              <p style="font-size:1.3rem;color:${p.stock > 0 ? 'inherit' : 'var(--red)'}">
                ${p.stock > 0 ? `${p.stock} in stock` : 'Sold Out!'}
              </p>
              <br/>
              ${p.stock > 0
                ? `<button class="sick-button" id="add-btn" onclick="addToCart()">+ Add To Cart</button>`
                : `<button class="sick-button" disabled>Sold Out</button>`
              }
              ${getUser()?.role === 'ADMIN'
                ? `<br/><br/><a href="/pages/sell.html?id=${p.id}" class="sick-button" style="margin-top:1rem;text-decoration:none">Edit Item ✏️</a>`
                : ''
              }
            </div>
          </div>`

        window.addToCart = async () => {
          if (!isLoggedIn()) { window.location.href = '/pages/login.html'; return }
          const btn = document.getElementById('add-btn')
          btn.disabled = true; btn.textContent = 'Adding...'
          try {
            await api('/cart', { method: 'POST', body: JSON.stringify({ productId: id }) })
            toast('Added to cart! 🛒')
            updateCartBadge()
            btn.textContent = 'Added! ✓'
            setTimeout(() => { btn.disabled = false; btn.textContent = '+ Add To Cart' }, 1500)
          } catch(err) {
            toast(err.message, 'error')
            btn.disabled = false; btn.textContent = '+ Add To Cart'
          }
        }
      }).catch(err => {
        document.getElementById('product-container').innerHTML =
          `<div class="error-message"><p><strong>Shoot!</strong> ${err.message}</p></div>`
      })
    }
  </script>
</body>
</html>
